name: uml-diagram-editor

x-back-image: &back-image
  image: ropoy/uml-diagram-editor-api:latest

x-front-image: &front-image
  image: nginx:stable-alpine

x-back-base: &back-base
  <<: *back-image
  env_file:
    - .env
  environment:
    DB__HOST: db

services:
  db:
    image: postgres:18
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      POSTGRES_DB: ${DB__NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  alembic:
    <<: *back-base
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
  rbac:
    <<: *back-base
    restart: on-failure
    depends_on:
      alembic:
        condition: service_completed_successfully
    command: ["python3", "init.py"]
  api:
    <<: *back-base
    depends_on:
      rbac:
        condition: service_completed_successfully
    restart: always
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  web:
    <<: *front-image
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/var/www/html:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
